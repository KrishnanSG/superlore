<svg xmlns="http://www.w3.org/2000/svg" width="172" height="28" viewBox="0 0 172 28" role="img" aria-label="Built with superlore">
  <title>Built with superlore</title>
  <!-- superlore "Built with" badge — LIGHT theme (fixed). For light backgrounds. -->
  <defs>
    <clipPath id="r"><rect width="172" height="28" rx="5" /></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="172" height="28" fill="#FFFFFF" />
    <rect width="38" height="28" fill="#6D5CF0" />
    <g transform="translate(8 3) scale(0.34375)">
      <polygon points="14,20 32,12 32,46 14,54" fill="#FFFFFF" />
      <polygon points="32,12 50,20 50,54 32,46" fill="#FFFFFF" opacity="0.5" />
    </g>
    <text x="50" y="18.5"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif"
      font-size="12">
      <tspan fill="#3a3b40">Built with </tspan><tspan font-weight="700" fill="#0b0c0e">superlore</tspan>
    </text>
  </g>
  <rect x="0.5" y="0.5" width="171" height="27" rx="5" fill="none" stroke="#e6e6ea" />
</svg>
