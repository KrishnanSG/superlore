name: e2e

# End-to-end scaffold gate. Builds the packages exactly as they'll publish, scaffolds a KB of every
# type with the built CLI, then installs (npm AND pnpm) and production-builds it. This is what would
# have caught the npm peer-resolution failures (mcp-handler's exact sdk peer; next-auth's prerelease
# range) — npm is strict where pnpm only warns, so we test the strict path on purpose.
#
# Runs on PRs (gate) and is `workflow_call`-able so `release.yml` can require it before publishing.

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scaffold:
    name: ${{ matrix.type }} · ${{ matrix.pm }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        type: [company-kb, product-docs, personal-kb]
        pm: [npm, pnpm]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      # Build the consumed packages exactly as they ship.
      - name: Build superlore + CLI
        run: pnpm turbo run build --filter=superlore --filter=superlore-cli

      # Pack superlore so the scaffold installs the REAL publish artifact (publishConfig swaps the
      # exports to dist) — this catches src-pointing-exports and dist-shape regressions before npm.
      - name: Pack superlore (publish artifact)
        run: |
          pnpm --filter superlore pack --pack-destination /tmp
          echo "SUPERLORE_TGZ=$(ls /tmp/superlore-*.tgz)" >> "$GITHUB_ENV"

      - name: Assert packed exports point at dist (not src)
        run: |
          node -e "const{execSync}=require('child_process');const j=execSync('tar -xzOf '+process.env.SUPERLORE_TGZ+' package/package.json').toString();const e=JSON.stringify(JSON.parse(j).exports);if(/\/src\//.test(e)){console.error('exports still point at src!');process.exit(1)}console.log('exports OK (dist)')"

      # Install the CLI globally from its packed tarball, so we run `superlore` through the global bin
      # SYMLINK — exactly how npx / `npm i -g` / node_modules/.bin invoke it for a real user. Invoking
      # the real dist path directly (node packages/cli/dist/index.js) masks symlink-entrypoint bugs.
      - name: Pack + globally install the CLI
        run: |
          pnpm --filter superlore-cli pack --pack-destination /tmp
          CLI_TGZ=$(ls /tmp/superlore-cli-*.tgz)
          npm install -g "$CLI_TGZ"

      - name: Assert the global bin actually runs (not a silent no-op)
        run: |
          OUT=$(superlore --version)
          echo "superlore --version -> $OUT"
          case "$OUT" in
            superlore/*) ;;
            *) echo "::error::global 'superlore' produced no version — the bin is a no-op via symlink"; exit 1 ;;
          esac

      - name: Scaffold a ${{ matrix.type }} KB (via the global bin symlink)
        run: superlore init /tmp/kb --name "CI ${{ matrix.type }}" --type ${{ matrix.type }} --yes --no-connect

      - name: Point the scaffold at the packed superlore
        working-directory: /tmp/kb
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.dependencies.superlore='file:'+process.env.SUPERLORE_TGZ;fs.writeFileSync('package.json',JSON.stringify(p,null,2))"

      - name: Install (${{ matrix.pm }})
        working-directory: /tmp/kb
        run: |
          if [ "${{ matrix.pm }}" = "pnpm" ]; then
            pnpm install --ignore-workspace
          else
            npm install --no-audit --no-fund
          fi

      # Every documented export must resolve to a file that actually ships — catches the class of
      # bug where an export is added to the dev map but not publishConfig (e.g. `./runtime.css`), so
      # the documented import throws "not exported" for a real consumer. Asserts on the INSTALLED
      # (published-shape) package, not the source.
      - name: Assert every export resolves to a shipped file
        working-directory: /tmp/kb
        run: |
          node -e "
            const fs=require('fs'), path=require('path');
            const root=path.dirname(require.resolve('superlore/package.json'));
            const exps=require('superlore/package.json').exports || {};
            const missing=[];
            for (const [key,val] of Object.entries(exps)) {
              const t = typeof val==='string' ? val : (val.import||val.default||val.types);
              if (t && !fs.existsSync(path.join(root, t))) missing.push(key+' -> '+t);
            }
            for (const need of ['.','./runtime','./runtime.css','./css','./mdx','./ui'])
              if (!exps[need]) missing.push('MISSING export key: '+need);
            if (missing.length) { console.error('::error::broken exports:', missing.join(' | ')); process.exit(1); }
            console.log('all '+Object.keys(exps).length+' exports resolve to shipped files OK');
          "

      - name: Production build
        working-directory: /tmp/kb
        run: ./node_modules/.bin/next build
