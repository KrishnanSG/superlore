name: release

on:
  push:
    branches: [main]

# id-token: write enables npm Trusted Publishing (OIDC) — no NPM_TOKEN, auto-provenance.
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Gate: scaffold every KB type and install + build it (npm AND pnpm) against the packed publish
  # artifact. If any scaffold can't install or build, we do NOT publish a broken package.
  e2e:
    uses: ./.github/workflows/e2e.yml

  release:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # Build every publishable package so `changeset publish` has dist/ ready (superlore + the CLI).
      - run: pnpm turbo run build --filter=superlore --filter=superlore-cli
      # Opens/updates a "Version Packages" PR; on merge (versions bump), publishes to npm.
      # createGithubReleases:false — we hand-bump versions (no changeset), so CHANGELOG.md has no
      # matching section and the action would otherwise dump the whole stale file into the release
      # body. GitHub Releases are cut by hand with curated notes that mirror the docs changelog
      # (see skills/superlore-release) — the docs changelog is the source of truth.
      - uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
