name: vsix

# Rebuild the hosted superlore Preview extension whenever its source (or the superlore package the
# webview bundles) changes, and commit the fresh .vsix to apps/docs/public — so the file `superlore
# connect` downloads (superlore.vercel.app/superlore-preview.vsix) is always the latest. No manual
# repackage step. The commit only touches the .vsix (outside the trigger paths) and carries
# [skip ci], so it never re-triggers this workflow.
on:
  push:
    branches: [main]
    paths:
      - "extensions/vscode/**"
      - "packages/superlore/src/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vsix
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter superlore-preview package
      - run: cp extensions/vscode/superlore-preview-*.vsix apps/docs/public/superlore-preview.vsix
      - name: Commit the rebuilt .vsix if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- apps/docs/public/superlore-preview.vsix; then
            git add apps/docs/public/superlore-preview.vsix
            git commit -m "chore(extension): rebuild hosted .vsix [skip ci]"
            git push
          else
            echo "No change to the hosted .vsix."
          fi
